{% extends "base.html" %}

{% block content %}
<h1>My Kitchen Pantry 🧺</h1>

<form method="POST">
    <label for="item">Add pantry item:</label><br>
    <input type="text" id="item" name="item" placeholder="e.g. eggs" required>
    <button type="submit">Add</button>
</form>

<div class="section">
    <h2>Current Pantry Items</h2>

    {% if pantry_items %}
        <div class="pantry">
            {% for item in pantry_items %}
                <div class="pantry-item">
                    🥫 {{ item }}

                    <form class="inline-form"
                          method="POST"
                          action="{{ url_for('delete_pantry_item', item_index=loop.index0) }}">
                        <button type="submit">Delete</button>
                    </form>

                </div>
            {% endfor %}
        </div>

    {% else %}
        <p>No pantry items yet.</p>
    {% endif %}
</div>

{% endblock %}
